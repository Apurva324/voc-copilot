version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: voc_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Optional: Persist local file uploads across restarts
      - ./Backend/Data/Raw:/app/Data/Raw

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voc_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend